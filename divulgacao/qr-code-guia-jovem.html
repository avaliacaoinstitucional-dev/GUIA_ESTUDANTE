<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Divulgação - Guia Jovem</title>
<style>
  :root {
    --bg: #0b1020;
    --bg2: #131a33;
    --text: #f8fbff;
    --muted: #cbd5e1;
    --brand: #6c5ce7;
    --brand2: #00d4ff;
    --pink: #ff5ea8;
    --line: rgba(255, 255, 255, .18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: Inter, Arial, Helvetica, sans-serif;
    color: var(--text);
    background: #111831;
  }

  body {
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .page {
    width: 210mm;
    min-height: 297mm;
    display: grid;
    place-items: center;
    padding: 22mm 18mm;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 12%, rgba(0, 212, 255, .32), transparent 28%),
      radial-gradient(circle at 82% 86%, rgba(255, 94, 168, .28), transparent 30%),
      linear-gradient(145deg, var(--bg2), var(--bg) 68%);
    box-shadow: 0 24px 70px rgba(0, 0, 0, .38);
  }

  .content {
    width: min(100%, 154mm);
    text-align: center;
    display: grid;
    justify-items: center;
    gap: 12mm;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 1px solid rgba(0, 212, 255, .35);
    border-radius: 999px;
    color: #c9f6ff;
    background: rgba(0, 212, 255, .12);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font-size: 58px;
    line-height: .95;
    font-weight: 900;
    letter-spacing: .03em;
  }

  h2 {
    max-width: 134mm;
    margin: 0;
    font-size: 35px;
    line-height: 1.12;
    font-weight: 900;
    color: #ffffff;
  }

  .gradient {
    background: linear-gradient(90deg, var(--brand2), #56e7ff 45%, #ff8bd0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  p {
    max-width: 132mm;
    margin: 0;
    color: var(--muted);
    font-size: 21px;
    line-height: 1.55;
  }

  .call {
    color: #ffffff;
    font-weight: 800;
  }

  .qr-wrap {
    display: grid;
    justify-items: center;
    gap: 8mm;
    width: 100%;
  }

  .qr {
    width: 112mm;
    height: 112mm;
    padding: 8mm;
    border-radius: 18px;
    background: #ffffff;
    border: 1px solid var(--line);
    box-shadow: 0 18px 46px rgba(0, 0, 0, .28);
  }

  .link {
    max-width: 100%;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, .22);
    background: rgba(255, 255, 255, .08);
    color: #eaf7ff;
    font-size: 16px;
    font-weight: 800;
    overflow-wrap: anywhere;
  }

  @page {
    size: A4;
    margin: 0;
  }

  @media print {
    html, body {
      width: 210mm;
      height: 297mm;
      padding: 0;
      background: #ffffff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      box-shadow: none;
    }
  }

  @media (max-width: 820px) {
    body { padding: 0; }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .content { gap: 28px; }

    h1 { font-size: 44px; }
    h2 { font-size: 28px; }
    p { font-size: 18px; }

    .qr {
      width: min(78vw, 360px);
      height: min(78vw, 360px);
      padding: 20px;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="content" aria-label="Divulgação do Guia Jovem">
      <span class="badge">Acesso rápido</span>
      <h1>GUIA JOVEM</h1>
      <h2>Qual curso superior combina com seu <span class="gradient">perfil?</span></h2>
      <p>Acesse o Guia Jovem e conheça as opções de cursos superiores, unidades ofertantes e áreas de formação.</p>
      <p class="call">Escaneie o QR Code abaixo para acessar pelo celular.</p>

      <div class="qr-wrap">
        <img class="qr" src="qr-guia-jovem.svg" alt="QR Code para acessar o Guia Jovem" />
        <div class="link">https://avaliacaoinstitucional-dev.github.io/GUIA_ESTUDANTE/</div>
      </div>
    </section>
  </main>
</body>
</html>
